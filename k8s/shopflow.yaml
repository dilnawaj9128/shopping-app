---
# ── Namespace ──────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: shopflow

---
# ── MongoDB Secret ─────────────────────────────────────────────
# DO NOT put real values here.
# Create with: kubectl create secret generic mongodb-secret \
#   --from-literal=MONGO_ROOT_USER=youruser \
#   --from-literal=MONGO_ROOT_PASS=yourpass \
#   --from-literal=MONGO_URI="mongodb://youruser:yourpass@mongodb:27017/shopflow?authSource=admin" \
#   -n shopflow
#
# OR use a secrets manager (AWS Secrets Manager / Vault / Sealed Secrets)
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: shopflow
  annotations:
    # Reminder: replace placeholder values via kubectl or CI/CD pipeline
    managed-by: "kubectl-or-sealed-secrets"
type: Opaque
stringData:
  MONGO_ROOT_USER: "REPLACE_VIA_KUBECTL_OR_SEALED_SECRETS"
  MONGO_ROOT_PASS: "REPLACE_VIA_KUBECTL_OR_SEALED_SECRETS"
  MONGO_URI:       "REPLACE_VIA_KUBECTL_OR_SEALED_SECRETS"

---
# ── App Secret ─────────────────────────────────────────────────
# Create with: kubectl create secret generic app-secret \
#   --from-literal=JWT_SECRET=$(node -e "console.log(require('crypto').randomBytes(64).toString('hex'))") \
#   -n shopflow
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: shopflow
  annotations:
    managed-by: "kubectl-or-sealed-secrets"
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_VIA_KUBECTL_OR_SEALED_SECRETS"

---
# ── Backend ConfigMap (non-sensitive config only) ──────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: shopflow
data:
  NODE_ENV: "production"
  PORT:     "5000"
  # Set this to your actual domain
  FRONTEND_URL: "https://REPLACE_WITH_YOUR_DOMAIN"

---
# ── MongoDB StatefulSet ────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: shopflow
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_ROOT_PASS
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 20
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: shopflow
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017

---
# ── Backend Deployment ─────────────────────────────────────────
# Image tag is injected by Jenkins/ArgoCD — not hardcoded here
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shopflow
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/health"
    spec:
      containers:
        - name: backend
          # Image is set by Helm values / ArgoCD — replace DOCKERHUB_USER
          image: REPLACE_DOCKERHUB_USER/shopflow-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: shopflow
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: shopflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# ── Frontend Deployment ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopflow
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: REPLACE_DOCKERHUB_USER/shopflow-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shopflow
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ── Ingress ────────────────────────────────────────────────────
# Replace host with your actual domain
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopflow-ingress
  namespace: shopflow
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: REPLACE_WITH_YOUR_DOMAIN
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
