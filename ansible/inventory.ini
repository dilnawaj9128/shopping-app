# Fill in your EC2 instance IP before running the playbook
# ansible-playbook -i inventory.ini site.yml

[jenkins]
jenkins-server ansible_host=REPLACE_WITH_EC2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/REPLACE_WITH_YOUR_KEY.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
