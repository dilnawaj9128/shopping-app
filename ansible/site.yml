---
# Run: ansible-playbook -i inventory.ini site.yml
- name: Setup ShopFlow CI Server
  hosts: jenkins
  become: yes

  tasks:
    - name: Update apt cache
      apt: update_cache=yes cache_valid_time=3600

    - name: Install Java and base tools
      apt:
        name: [openjdk-17-jdk, curl, wget, git, unzip, gnupg, lsb-release, apt-transport-https, ca-certificates]
        state: present

    # Docker
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg

    - name: Add Docker repo
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

    - name: Install Docker
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present

    - name: Start Docker
      systemd: name=docker state=started enabled=yes

    - name: Add ubuntu to docker group
      user: name=ubuntu groups=docker append=yes

    # Jenkins
    - name: Add Jenkins GPG key
      apt_key:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key

    - name: Add Jenkins repo
      apt_repository:
        repo: "deb https://pkg.jenkins.io/debian-stable binary/"

    - name: Install Jenkins
      apt: name=jenkins state=present update_cache=yes

    - name: Add Jenkins to docker group
      user: name=jenkins groups=docker append=yes

    - name: Start Jenkins
      systemd: name=jenkins state=started enabled=yes

    # Trivy
    - name: Install Trivy
      shell: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin v0.45.0
      args:
        creates: /usr/local/bin/trivy

    # kubectl
    - name: Install kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl && rm kubectl
      args:
        creates: /usr/local/bin/kubectl

    # Helm
    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    # ArgoCD CLI
    - name: Install ArgoCD CLI
      shell: |
        curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        install -m 555 /tmp/argocd /usr/local/bin/argocd
      args:
        creates: /usr/local/bin/argocd

    # Firewall
    - name: Allow SSH
      ufw: rule=allow port='22'
    - name: Allow Jenkins
      ufw: rule=allow port='8080'
    - name: Enable UFW
      ufw: state=enabled

    - name: Get Jenkins initial password
      command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_pass
      ignore_errors: yes

    - name: Show Jenkins URL
      debug:
        msg: |
          ✅ Jenkins ready!
          URL:      http://{{ ansible_host }}:8080
          Password: {{ jenkins_pass.stdout | default('Check /var/lib/jenkins/secrets/initialAdminPassword') }}
