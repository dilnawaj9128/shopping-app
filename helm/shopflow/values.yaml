# ═══════════════════════════════════════════════════════
#   ShopFlow Helm Values
#   Override these for your environment:
#   helm install shopflow ./helm/shopflow -f my-values.yaml
# ═══════════════════════════════════════════════════════

global:
  namespace: shopflow
  # Set to your Docker Hub username or ECR registry
  dockerRegistry: "REPLACE_WITH_YOUR_REGISTRY"

backend:
  image:
    repository: shopflow-backend
    tag: "latest"          # Jenkins auto-updates this on each build
    pullPolicy: Always
  replicas: 2
  port: 5000
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

frontend:
  image:
    repository: shopflow-frontend
    tag: "latest"
    pullPolicy: Always
  replicas: 2
  port: 3000
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

mongodb:
  storageSize: "5Gi"
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

ingress:
  enabled: true
  # Replace with your actual domain
  host: "REPLACE_WITH_YOUR_DOMAIN"
  className: nginx

# ── Secrets ─────────────────────────────────────────────
# DO NOT put real values here.
# Pass secrets at deploy time:
#   helm install shopflow ./helm/shopflow \
#     --set secrets.mongoUri="mongodb://..." \
#     --set secrets.jwtSecret="$(openssl rand -hex 64)"
#
# OR create the K8s secrets beforehand (preferred) and
# set secretsExternallyManaged=true to skip creation.
secretsExternallyManaged: false
secrets:
  mongoUri: "REPLACE_AT_DEPLOY_TIME"
  jwtSecret: "REPLACE_AT_DEPLOY_TIME"
  mongoRootUser: "REPLACE_AT_DEPLOY_TIME"
  mongoRootPass: "REPLACE_AT_DEPLOY_TIME"
