---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dilnawaz9128/shopflow-devops
    targetRevision: main
    path: helm/shopflow
  destination:
    server: https://kubernetes.default.svc
    namespace: shopflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
