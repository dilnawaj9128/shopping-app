services:
  mongodb:
    image: mongo:7.0
    container_name: shopflow-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: shopflow
    volumes:
      - mongo_data:/data/db
    networks:
      - shopflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      target: production
    container_name: shopflow-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/shopflow?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shopflow-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  seed:
    build:
      context: ./backend
      target: production
    container_name: shopflow-seed
    command: node config/seed.js
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/shopflow?authSource=admin
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASS: ${SEED_ADMIN_PASS}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL}
      SEED_USER_PASS: ${SEED_USER_PASS}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shopflow-net
    restart: "no"

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: shopflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shopflow-net

volumes:
  mongo_data:
    name: shopflow_mongo_data

networks:
  shopflow-net:
    driver: bridge
